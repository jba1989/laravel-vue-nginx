server {
    listen 80;
    # listen 443 ssl;

    server_name _;

    index index.php index.html;

    access_log /dev/stdout;
    error_log /dev/stderr;

    root /var/www/public;

    # Shared proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    gzip            on;
    gzip_min_length 500;
    gzip_comp_level 2;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Reverb WebSocket - 使用 /reverb 路徑前綴
    location /reverb/ {
        proxy_pass http://reverb:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Laravel entrypoint for backend-routed requests
    location @laravel_app {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI $uri$is_args$args;
    }

    # Web session auth entrypoint: external /backend/* -> internal /* (Laravel web routes)
    location ^~ /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        try_files $uri $uri/ @laravel_app;
        gzip_static on;
    }

    location ~ ^/(api|broadcasting|ecpay|sanctum)/ {
        try_files $uri $uri/ @laravel_app;
        gzip_static on;
    }

    # Block direct execution of other PHP files.
    location ~ \.php$ {
        return 404;
    }

    # Protect hidden files except ACME challenge paths.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        proxy_redirect off;
        proxy_pass http://node:3000;
    }
}
