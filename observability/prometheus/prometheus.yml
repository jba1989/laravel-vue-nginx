global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: alloy
    static_configs:
      - targets: ['alloy:12345']
        labels:
          project: laravel-vue-nginx

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: node-exporter
    static_configs:
      - targets: ['host.docker.internal:9100']
